openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RAG Tabanlı Akıllı Belge Analiz Platformu API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: query
    description: RAG query operations
  - name: history
    description: Query history
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /query:
    post:
      operationId: queryDocument
      tags: [query]
      summary: Query documents using RAG (single-turn)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: RAG answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"

  /chat:
    post:
      operationId: chatWithDocuments
      tags: [query]
      summary: Conversational RAG chat (multi-turn with memory)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response with conversation memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/sessions:
    get:
      operationId: listChatSessions
      tags: [query]
      summary: List all chat sessions for the current user
      responses:
        "200":
          description: List of chat sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionItem"

  /chat/sessions/{sessionId}/messages:
    get:
      operationId: getSessionMessages
      tags: [query]
      summary: Get all messages for a chat session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageItem"

  /chat/sessions/{sessionId}:
    delete:
      operationId: deleteChatSession
      tags: [query]
      summary: Delete a chat session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteSessionResponse"

  /chat/clear-session:
    post:
      operationId: clearChatSession
      tags: [query]
      summary: Clear conversation memory for a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClearSessionRequest"
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

  /history:
    get:
      operationId: getHistory
      tags: [history]
      summary: Get query history
      responses:
        "200":
          description: List of past queries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryItem"
    delete:
      operationId: clearHistory
      tags: [history]
      summary: Clear all query history
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Document:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        uploadedAt:
          type: string
          format: date-time
        pageCount:
          type: integer
        chunkCount:
          type: integer
        fileSize:
          type: integer
      required:
        - id
        - filename
        - uploadedAt
        - pageCount
        - chunkCount
        - fileSize

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    QueryRequest:
      type: object
      properties:
        question:
          type: string
        documentId:
          type: string
          description: Optional - if provided, query only this document
        topK:
          type: integer
          default: 5
      required:
        - question

    QueryResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceChunk"
        documentId:
          type: string
        question:
          type: string
        historyId:
          type: string
      required:
        - answer
        - sources
        - question
        - historyId

    SourceChunk:
      type: object
      properties:
        text:
          type: string
        page:
          type: integer
        score:
          type: number
          format: float
        documentId:
          type: string
        filename:
          type: string
      required:
        - text
        - page
        - score
        - documentId
        - filename

    ChatRequest:
      type: object
      properties:
        question:
          type: string
        documentId:
          type: string
        sessionId:
          type: string
          description: Conversation session ID for maintaining context
        topK:
          type: integer
          default: 5
      required:
        - question

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceChunk"
        sessionId:
          type: string
        question:
          type: string
        historyId:
          type: string
      required:
        - answer
        - sources
        - sessionId
        - question
        - historyId

    ClearSessionRequest:
      type: object
      properties:
        sessionId:
          type: string
      required:
        - sessionId

    HistoryItem:
      type: object
      properties:
        id:
          type: string
        question:
          type: string
        answer:
          type: string
        documentId:
          type: string
        documentName:
          type: string
        createdAt:
          type: string
          format: date-time
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceChunk"
      required:
        - id
        - question
        - answer
        - createdAt
        - sources

    SessionItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        documentId:
          type: string
        documentName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
        - updatedAt

    MessageItem:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/SourceChunk"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - content
        - createdAt

    DeleteSessionResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
